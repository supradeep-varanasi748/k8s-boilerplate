apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: dev
spec:
  serviceAccountName: app-sa
  tolerations:
    - key: "Team"
      operator: "Equal"
      value: "a"
      effect: "NoSchedule"

  containers:
    - name: kubectl
      image: bitnami/kubectl
      command:
        - sleep
        - "3600"