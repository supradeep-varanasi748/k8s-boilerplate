apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: dev
spec:
  containers:
  - name: kubectl
    image: bitnami/kubectl
    command: ["sleep", "3600"]
  - kind: ServiceAccount
  name: app-sa
  namespace: dev
  tolerations:
- key: "Team"
  operator: "Equal"
  value: "a"
  effect: "NoSchedule"




